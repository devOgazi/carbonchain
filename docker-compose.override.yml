version: '3.9'

services:

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    command: npm run start:dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./api/src:/app/src

  frontend:
    command: npx ng serve --host 0.0.0.0 --poll 2000
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "4200:4200"
